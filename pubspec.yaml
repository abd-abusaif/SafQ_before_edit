name: safq_new
description: "Graduation Project, First Edition"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.0.0
  http: ^1.6.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logoPassengers.png

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
